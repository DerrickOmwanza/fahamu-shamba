<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js Loading Test</title>
    <script src="/js/chart.min.js"></script>
</head>
<body>
    <h1>Chart.js Loading Test</h1>
    <p>Checking if Chart.js is loaded...</p>
    <div id="result"></div>
    <canvas id="testChart" width="400" height="200"></canvas>
    
    <script>
        console.log('Chart.js loaded:', typeof Chart);
        document.getElementById('result').innerHTML = 'Chart.js loaded: ' + (typeof Chart !== 'undefined' ? 'YES' : 'NO');
        
        if (typeof Chart !== 'undefined') {
            const ctx = document.getElementById('testChart').getContext('2d');
            const testChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    datasets: [{
                        label: 'Test Data',
                        data: [10, 20, 15, 25],
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        title: {
                            display: true,
                            text: 'Chart.js Test'
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
