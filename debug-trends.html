<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Trends Chart</title>
    <script src="/js/chart.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-info { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .error { color: red; font-weight: bold; }
        .success { color: green; font-weight: bold; }
        canvas { border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Debug Trends Chart</h1>
    
    <div class="debug-info">
        <h3>Chart.js Status</h3>
        <div id="chartStatus"></div>
    </div>
    
    <div class="debug-info">
        <h3>API Test</h3>
        <div id="apiStatus"></div>
    </div>
    
    <div class="debug-info">
        <h3>Chart Container</h3>
        <canvas id="debugChart" width="400" height="200"></canvas>
        <div id="chartStatus"></div>
    </div>
    
    <script>
        // Check Chart.js loading
        console.log('Chart.js loaded:', typeof Chart);
        document.getElementById('chartStatus').innerHTML = 'Chart.js loaded: ' + (typeof Chart !== 'undefined' ? '<span class="success">YES</span>' : '<span class="error">NO</span>');
        
        // Test API
        async function testAPI() {
            try {
                const response = await fetch('/api/market-trends?crop=Maize');
                const data = await response.json();
                document.getElementById('apiStatus').innerHTML = 'API Response: ' + (data.success ? '<span class="success">SUCCESS</span>' : '<span class="error">FAILED</span>');
                console.log('API Data:', data);
            } catch (error) {
                document.getElementById('apiStatus').innerHTML = 'API Error: <span class="error">' + error.message + '</span>';
                console.error('API Error:', error);
            }
        }
        
        // Test Chart rendering
        function testChart() {
            if (typeof Chart === 'undefined') {
                document.getElementById('chartStatus').innerHTML = '<span class="error">Chart.js not loaded</span>';
                return;
            }
            
            try {
                const ctx = document.getElementById('debugChart').getContext('2d');
                const testChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                        datasets: [{
                            label: 'Test Data',
                            data: [10, 20, 15, 25],
                            borderColor: 'rgb(75, 192, 192)',
                            tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            title: {
                                display: true,
                                text: 'Debug Chart'
                            }
                        }
                    }
                });
                document.getElementById('chartStatus').innerHTML = '<span class="success">Chart rendered successfully</span>';
            } catch (error) {
                document.getElementById('chartStatus').innerHTML = '<span class="error">Chart error: ' + error.message + '</span>';
                console.error('Chart Error:', error);
            }
        }
        
        // Run tests
        testAPI();
        testChart();
    </script>
</body>
</html>
